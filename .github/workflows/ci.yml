name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sentiment_analysis
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: sentiment_server
    env:
      DJANGO_SETTINGS_MODULE: sentiment_server.settings.local
      SECRET_KEY: ci-secret-key
      JWT_SIGNING_KEY: ci-jwt-signing-key-with-32-bytes
      DEBUG: "True"
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: sentiment_analysis
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      MODEL_WORKSPACE_DIR: ml_assets
      MODEL_PATH: ml_assets/models/bert
      USE_GPU: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential default-libmysqlclient-dev pkg-config
        working-directory: .
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[testing]"
      - name: Django system check
        run: python manage.py check
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentiment_webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.11.0"
          cache: npm
          cache-dependency-path: sentiment_webapp/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Check frontend
        run: npm run check
      - name: Build frontend
        run: npm run build
